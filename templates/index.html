<!DOCTYPE html>
<html>

<head>

    <title>AI Premium Chatbot</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }

        body {

            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(270deg, #020617, #0f172a, #020617);
            background-size: 400% 400%;

            animation: bgMove 12s infinite alternate;

            color: white;

        }

        @keyframes bgMove {
            0% {
                background-position: left;
            }

            100% {
                background-position: right;
            }
        }

        .chat-container {

            width: 650px;

            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);

            border-radius: 25px;

            padding: 25px;

            box-shadow:
                0 0 40px rgba(0, 0, 0, 0.7),
                0 0 80px rgba(59, 130, 246, 0.3);

            animation: fadeIn 1s ease;

        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {

            font-size: 28px;
            text-align: center;
            margin-bottom: 15px;

            background: linear-gradient(90deg, #3b82f6, #9333ea);
            -webkit-background-clip: text;
            color: transparent;

        }

        #chatbox {

            height: 420px;
            overflow-y: auto;

            background: #020617;

            padding: 18px;

            border-radius: 20px;

            margin-bottom: 12px;

            scroll-behavior: smooth;

        }

        .message {

            padding: 14px 18px;

            margin: 12px 0;

            border-radius: 15px;

            max-width: 80%;

            animation: pop 0.3s ease;

        }

        @keyframes pop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .user {

            background: linear-gradient(135deg, #2563eb, #1e40af);

            margin-left: auto;

            box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);

        }

        .bot {

            background: #374151;

            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);

        }

        .input-area {

            display: flex;

            gap: 10px;

            margin-top: 5px;

        }

        input {

            flex: 1;

            padding: 14px;

            border: none;

            border-radius: 12px;

            outline: none;

            background: #0f172a;

            color: white;

            transition: 0.3s;

        }

        input:focus {

            box-shadow: 0 0 10px #3b82f6;

        }

        button {

            padding: 14px 20px;

            border: none;

            background: linear-gradient(135deg, #3b82f6, #9333ea);

            color: white;

            border-radius: 12px;

            cursor: pointer;

            font-weight: bold;

            transition: 0.3s;

        }

        button:hover {

            transform: scale(1.05);

            box-shadow: 0 0 15px #3b82f6;

        }

        #chatbox::-webkit-scrollbar {

            width: 6px;

        }

        #chatbox::-webkit-scrollbar-thumb {

            background: #3b82f6;

            border-radius: 10px;

        }

        .typing {

            font-style: italic;
            opacity: 0.7;

        }
    </style>

</head>

<body>

    <div class="chat-container">

        <div class="header">⚡Sahil AI Chatbot</div>

        <div id="chatbox"></div>

        <div class="input-area">

            <input id="message" placeholder="Ask anything Sahil...">

            <button onclick="sendMessage()">Send Sahil</button>

        </div>

    </div>

    <script>

        function sendMessage() {

            let input = document.getElementById("message")

            let message = input.value.trim()

            if (message === "") return

            let chatbox = document.getElementById("chatbox")

            chatbox.innerHTML += `<div class="message user">${message}</div>`

            let botDiv = document.createElement("div")

            botDiv.className = "message bot typing"

            botDiv.innerText = "Typing..."

            chatbox.appendChild(botDiv)

            input.value = ""

            fetch("/chat", {

                method: "POST",

                headers: { "Content-Type": "application/json" },

                body: JSON.stringify({ message: message })

            }).then(response => {

                const reader = response.body.getReader()

                const decoder = new TextDecoder()

                botDiv.innerText = ""

                function read() {

                    reader.read().then(({ done, value }) => {

                        if (done) return

                        let chunk = decoder.decode(value)

                        chunk = chunk.replace("data:", "")

                        botDiv.textContent += chunk

                        chatbox.scrollTop = chatbox.scrollHeight

                        read()

                    })

                }

                read()

            })

        }

        document.getElementById("message").addEventListener("keypress", function (e) {

            if (e.key === "Enter") {
                sendMessage()
            }

        })

    </script>

</body>

</html>
